repository: https://github.com/mkroman/k8s.git

argocdNamespace: argocd

spec:
  destination:
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/mkroman/k8s
    targetRevision: HEAD

applications:
  - name: k8s-meta-apps
  - name: k8s-rwx-apps

# -- List of Argo CD projects.
projects:
  - name: cert-manager
    description: "Manages the deployment of cert-manager and its associated cluster-wide resources
      (CRDs, Webhooks, and ClusterIssuers)."
    destinations:
      - namespace: cert-manager
      - namespace: kube-system
    sourceRepos:
      - https://github.com/mkroman/k8s
    clusterResourceWhitelist:
      - kind: ClusterRole
        group: rbac.authorization.k8s.io
      - kind: ClusterRoleBinding
        group: rbac.authorization.k8s.io
      - kind: MutatingWebhookConfiguration
        group: admissionregistration.k8s.io
      - kind: ValidatingWebhookConfiguration
        group: admissionregistration.k8s.io
      - kind: CustomResourceDefinition
        group: apiextensions.k8s.io
      - kind: ClusterIssuer
        group: cert-manager.io

  - name: chadgpt
    destinations:
      - namespace: chadgpt
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: chadgpt-magistr
    destinations:
      - namespace: chadgpt-magistr
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: cloudnative-pg
    description: "Manages the deployment, configuration, and lifecycle of the CloudNativePG operator."
    destinations:
      - namespace: cnpg-system
    sourceRepos:
      - https://github.com/mkroman/k8s
    clusterResourceWhitelist:
      - kind: ClusterRole
        group: rbac.authorization.k8s.io
      - kind: ClusterRoleBinding
        group: rbac.authorization.k8s.io
      - kind: MutatingWebhookConfiguration
        group: admissionregistration.k8s.io
      - kind: ValidatingWebhookConfiguration
        group: admissionregistration.k8s.io
      - kind: CustomResourceDefinition
        group: apiextensions.k8s.io
      - kind: Namespace
        group: ""
        name: cnpg-system

  - name: longhorn
    description: "Longhorn distributed block storage"
    destinations:
      - namespace: longhorn-system
    sourceRepos:
      - https://github.com/mkroman/k8s
    clusterResourceWhitelist:
      - group: "apiextensions.k8s.io"
        kind: CustomResourceDefinition
      - group: "rbac.authorization.k8s.io"
        kind: ClusterRole
      - group: "rbac.authorization.k8s.io"
        kind: ClusterRoleBinding
      - group: "storage.k8s.io"
        kind: StorageClass
      - group: "storage.k8s.io"
        kind: CSIDriver
      - group: "storage.k8s.io"
        kind: CSINode
      - group: "admissionregistration.k8s.io"
        kind: MutatingWebhookConfiguration
      - group: "admissionregistration.k8s.io"
        kind: ValidatingWebhookConfiguration
      - group: "scheduling.k8s.io"
        kind: PriorityClass
      - group: ""
        kind: PersistentVolume
      # Allows Longhorn nodes/engines (often managed by CRDs) to be cluster-scoped if necessary
      - group: "longhorn.io"
        kind: "*"

  - name: monitoring
    description: "Cluster monitoring stack (prometheus, thanos, grafana, ..)"
    destinations:
      - namespace: grafana
      - namespace: monitoring
    sourceRepos:
      - https://github.com/mkroman/k8s
    clusterResourceWhitelist:
      - group: rbac.authorization.k8s.io
        kind: ClusterRole
      - group: rbac.authorization.k8s.io
        kind: ClusterRoleBinding
    namespaceResourceBlacklist: []

  - name: mosquitto
    destinations:
      - namespace: mosquitto
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: mumble
    destinations:
      - namespace: rwx
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: mqtt2prometheus
    destinations:
      - namespace: mqtt2prometheus
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: nats
    description: "NATS messaging system for data layer services"
    destinations:
      - namespace: nats
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: open-webui
    destinations:
      - namespace: rwx-openwebui-prod
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: rwx
    destinations:
      - namespace: rwx
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: prometheus-operator
    destinations:
      - namespace: prometheus-operator
    sourceRepos:
      - https://github.com/mkroman/k8s
    clusterResourceWhitelist:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
      - group: rbac.authorization.k8s.io
        kind: ClusterRole
      - group: rbac.authorization.k8s.io
        kind: ClusterRoleBinding

  - name: quickwit
    description: "Quickwit search and analytics engine"
    destinations:
      - namespace: quickwit-prod
    sourceRepos:
      - https://github.com/mkroman/k8s

  - name: redis
    description: "Redis sentinel deployment"
    destinations:
      - namespace: rwx-redis-prod
    sourceRepos:
      - https://github.com/mkroman/k8s
    namespaceResourceBlacklist:
      - group: ''
        kind: ResourceQuota
      - group: ''
        kind: LimitRange

  - name: sealed-secrets
    description: "Encrypted secrets operator for Kubernetes"
    destinations:
      - namespace: kube-system
    sourceRepos:
      - https://github.com/mkroman/k8s
    clusterResourceWhitelist:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
      - group: rbac.authorization.k8s.io
        kind: ClusterRole
      - group: rbac.authorization.k8s.io
        kind: ClusterRoleBinding
      - group: admissionregistration.k8s.io
        kind: ValidatingWebhookConfiguration
      - group: admissionregistration.k8s.io
        kind: MutatingWebhookConfiguration

  - name: traefik
    description: "Cloud-native application proxy"
    destinations:
      - namespace: traefik
    sourceRepos:
      - https://github.com/mkroman/k8s
    clusterResourceWhitelist:
      - group: apiextensions.k8s.io
        kind: CustomResourceDefinition
      - group: rbac.authorization.k8s.io
        kind: ClusterRole
      - group: rbac.authorization.k8s.io
        kind: ClusterRoleBinding
      - group: networking.k8s.io
        kind: IngressClass

  - name: zeta
    destinations:
      - namespace: zeta-prod
      - namespace: zeta-dev
    sourceRepos:
      - https://github.com/mkroman/k8s

# List of namespaces to create.
namespaces:
  - name: cert-manager
  - name: chadgpt
  - name: chadgpt-magistr
  - name: grafana
  - name: longhorn-system
  - name: monitoring
  - name: mosquitto
  - name: mqtt2prometheus
  - name: nats
  - name: prometheus-operator
  - name: quickwit-prod
  - name: rwx-redis-prod
  - name: rwx-openwebui-prod
  - name: traefik
  - name: zeta-prod
  - name: zeta-dev

newApplications:
  - name: cert-manager
    project: cert-manager
    source:
      repoURL: https://github.com/mkroman/k8s
      path: cert-manager

  - name: chadgpt
    project: chadgpt
    source:
      repoURL: https://github.com/mkroman/k8s
      path: chadgpt

  - name: chadgpt-magistr
    project: chadgpt-magistr
    source:
      repoURL: https://github.com/mkroman/k8s
      path: chadgpt
      helm:
        valueFiles:
          - values-magistr.yaml

  - name: cloudnative-pg
    project: cloudnative-pg
    destination:
      namespace: cnpg-system
    source:
      repoURL: https://github.com/mkroman/k8s
      path: cloudnative-pg
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ApplyOutOfSyncOnly=true
        # We need to use server-side apply because the CRD metadata is too large.
        - ServerSideApply=true

  - name: grafana
    project: monitoring
    destination:
      namespace: grafana
    source:
      repoURL: https://github.com/mkroman/k8s
      path: grafana

  - name: longhorn
    finalizers:
      - resources-finalizer.argocd.argoproj.io
      # The pre-delete-finalizer hook is necessary because of how longhorn deploys
      # jobs on hooks.
      - pre-delete-finalizer.argocd.argoproj.io
      - pre-delete-finalizer.argocd.argoproj.io/cleanup
    project: longhorn
    destination:
      namespace: longhorn-system
    source:
      repoURL: https://github.com/mkroman/k8s
      path: longhorn

  - name: monitoring
    project: monitoring
    destination:
      namespace: monitoring
    source:
      repoURL: https://github.com/mkroman/k8s
      path: monitoring

  - name: mumble
    project: mumble
    destination:
      namespace: rwx
    source:
      repoURL: https://github.com/mkroman/k8s
      path: mumble

  - name: mosquitto
    project: mosquitto
    destination:
      namespace: mosquitto
    source:
      repoURL: https://github.com/mkroman/k8s
      path: mosquitto

  - name: mqtt2prometheus
    project: mqtt2prometheus
    destination:
      namespace: mqtt2prometheus
    source:
      repoURL: https://github.com/mkroman/k8s
      path: mqtt2prometheus

  - name: mqtt2prometheus-mqtt-topic
    project: mqtt2prometheus
    destination:
      namespace: mqtt2prometheus
    source:
      repoURL: https://github.com/mkroman/k8s
      path: mqtt2prometheus
      helm:
        valueFiles:
          - values-topic-metrics.yaml

  - name: nats
    project: nats
    destination:
      namespace: nats
    source:
      repoURL: https://github.com/mkroman/k8s
      path: nats

  - name: open-webui
    project: open-webui
    destination:
      namespace: rwx-openwebui-prod
    source:
      repoURL: https://github.com/mkroman/k8s
      path: open-webui

  - name: postgres
    project: rwx
    useDefaultFinalizers: false # We don't accidentally want to delete a postgres cluster
    destination:
      namespace: rwx
    source:
      repoURL: https://github.com/mkroman/k8s
      path: postgres

  - name: prometheus-operator
    project: prometheus-operator
    destination:
      namespace: prometheus-operator
    source:
      repoURL: https://github.com/mkroman/k8s
      path: prometheus-operator/base
    syncPolicy:
      automated:
        selfHeal: true
      syncOptions:
        - ApplyOutOfSyncOnly=true
        # We need to use server-side apply because the CRD metadata is too large.
        - ServerSideApply=true

  - name: quickwit
    annotations:
      argocd.argoproj.io/sync-wave: "2"
    project: quickwit
    destination:
      namespace: quickwit-prod
    source:
      repoURL: https://github.com/mkroman/k8s
      path: quickwit

  - name: redis
    project: redis
    destination:
      namespace: rwx-redis-prod
    source:
      repoURL: https://github.com/mkroman/k8s
      path: redis

  - name: sealed-secrets
    project: sealed-secrets
    destination:
      namespace: kube-system
    source:
      repoURL: https://github.com/mkroman/k8s
      path: sealed-secrets

  - name: traefik
    project: traefik
    destination:
      namespace: traefik
    source:
      repoURL: https://github.com/mkroman/k8s
      path: traefik

  - name: zeta
    annotations:
      argocd.argoproj.io/sync-wave: "2"
    project: zeta
    destination:
      namespace: zeta-prod
    source:
      repoURL: https://github.com/mkroman/k8s
      path: zeta
      helm:
        valueFiles:
          - values-prod.yaml
