vector:
  replicas: 1
  role: "Aggregator"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "600m"
      memory: "768Mi"

  service:
    ports:
      - name: otlp-http
        port: 4318
        protocol: TCP
        targetPort: 4318
      - name: api
        port: 8686
        protocol: TCP
        targetPort: 8686
      - name: prom-exporter
        port: 9090
        protocol: TCP
        targetPort: 9090
      - name: vector
        port: 6000
        protocol: TCP
        targetPort: 6000
      - name: otlp-grpc
        port: 4317
        protocol: TCP
        targetPort: 4317

  customConfig:
    data_dir: /vector-data-dir
    api:
      enabled: true
      address: 0.0.0.0:8686
    sources:
      # Automatically generate random syslogs for easier debugging.
      generate_syslog:
        type: demo_logs
        format: syslog

      # Enable OTel logs and traces.
      otel:
        type: opentelemetry
        grpc:
          address: 0.0.0.0:4317
        http:
          address: 0.0.0.0:4318

      # Monitor Vector metrics.
      internal_metrics:
        type: internal_metrics

      # Enable ingestion of logs and traces directly from Vector instances.
      vector:
        address: 0.0.0.0:6000
        type: vector
        version: "2"

    transforms:
      # Filter that only outputs logs from the vector source.
      vector_logs:
        type: filter
        inputs: [vector]
        condition:
          type: is_log

      # Remap syslog messages to a OTel-compatible log structure.
      syslog_otel_logs:
        type: remap
        inputs: []
        source: |-
          structured = parse_syslog!(.message)
          .timestamp_nanos = to_unix_timestamp!(structured.timestamp, unit: "nanoseconds")
          .body = structured
          .service_name = structured.appname
          .resource_attributes.source_type = .source_type
          .resource_attributes.host.hostname = structured.hostname
          .resource_attributes.service.name = structured.appname
          .attributes.syslog.procid = structured.procid
          .attributes.syslog.facility = structured.facility
          .attributes.syslog.version = structured.version
          .severity_text = if includes(["emerg", "err", "crit", "alert"], structured.severity) {
            "ERROR"
          } else if structured.severity == "warning" {
            "WARN"
          } else if structured.severity == "debug" {
            "DEBUG"
          } else if includes(["info", "notice"], structured.severity) {
            "INFO"
          } else {
           structured.severity
          }
          .scope_name = structured.msgid
          del(.message)
          del(.timestamp)
          del(.service)
          del(.source_type)

    sinks:
      prom_exporter:
        type: prometheus_exporter
        inputs: [internal_metrics]
        address: 0.0.0.0:9090

      quickwit:
        type: http
        method: post
        inputs: [vector_logs]
        encoding:
          codec: json
        framing:
          method: newline_delimited
        uri: "http://quickwit-indexer.quickwit-prod.svc.cluster.local:7280/api/v1/vector-kubernetes_logs-v0\
          _1/ingest"
      # debug:
      #   type: console
      #   inputs: [vector_logs]
      #   encoding:
      #     codec: json
      #   framing:
      #     method: newline_delimited
